<!DOCTYPE html>
<html>

    <head>
      <link rel="stylesheet" type="text/css" href="style.css" />
    </head>

  <body style="color: darkslategrey;background-color: cadetblue; background-image: url(./river.gif); background-size: cover; height: 100vh;">

    <div class="window" id="welcome" style="top: 50%; left: 50%; transform: translate(-50%, -50%);">

    <!--<div style="display: flex; justify-content: end;">
            <div class="closebutton" id="welcomeclose">✖</div>
            <div class="headerbutton" id = "welcomeheader">■</div>
        </div>-->

        <div class="headerbutton" id = "welcomeheader" style="display: flex; width: 100%; padding-bottom: 3px;">
            <div class="closebutton" id="welcomeclose" style="margin-right: 10px;">✖</div>
            Welcome
            </div>
        <div style="margin: 6px; background-color: mediumseagreen; border-radius: 20px; padding: 5px;">
            <h1 style="color:black">Welcome to LaupiOS!</h1>
            <p>The site by Laupi_oida.</p>
            </p>
        </div>
    </div>

      <!-- topbar -->
      <div id="top" style="display: flex; justify-content: space-between; color: black; background-color: seagreen; border-radius: 15px; font-weight: bold; font-family: sans-serif; max-height: 25px; ">

          <p style="margin-left: 15px; transform: translate(0,-15px)">
                LaupiOS v 0.4
          </p>

          <p id="timeElement" style="transform: translate(0,-15px);">
          </p>

          <p style="margin-right: 15px; transform: translate(0,-15px);">
              Whats an high tier programmer to an idiot?
          </p>

      </div>

      <div class="desktopApps" id="desktopApps">

          <div onclick="handleIconTap(this)" style="cursor: pointer; display: flex; align-items: start; justify-content: space-between;">
              <img src=" Notes.png" style="width: 32px; height: 32px;">
              <div class="selected" style="color: gray;"></div>
          </div>

      </div>

      <!--Notes-->
    <div class="window" id="notes" style="display: none; width: fit-content; color: black;">

        <div class="headerbutton" id = "notesheader" style="display: flex; width: 100%; padding-bottom: 3px;">
            <div class="closebutton" id="notesclose" style="margin-right: 10px;">✖</div>
            Nutnotes
            </div>

        <div style="background-color: mediumseagreen; margin: 6px; border-radius: 12px; width: 520px; height: 480px; padding: 16px; font-family: sans-serif; display: flex;">

            <div id="notessidebar" style="cursor: pointer; background-color: springgreen; width: 720px; margin-right: 10px; padding: 16px; border-radius: 16px; width: fit-content;"></div>

            <div id="notesContent" style="overflow-y: scroll;">
            </div>
        </div>
    </div>

</body>

    <script src="script.js"></script>
